<header class="nav" [class.nav--scrolled]="scrolled()">
  <div class="container nav__inner">

    <!-- Marca -->
    <a class="brand" href="#hero" (click)="closeMenu()">
      <img class="brand__logo" src="logo.png" alt="" width="36" height="36" />
      <span class="brand__name">Daddy <span class="brand__sr">Sr.PC</span></span>
      <span class="brand__solder" aria-hidden="true"></span>
    </a>

    <!-- Links de sección -->
    <nav class="nav__links" [class.is-open]="menuOpen()" aria-label="Navegación principal">
      <a href="#features" (click)="closeMenu()">{{ 'nav.features' | transloco }}</a>
      <a href="#howit" (click)="closeMenu()">{{ 'nav.howItWorks' | transloco }}</a>
      <a href="#demo" (click)="closeMenu()">{{ 'nav.tryIt' | transloco }}</a>

      <!-- Auth en mobile (dentro del menú) -->
      <div class="nav__auth-mobile">
        <a class="btn btn--secondary nav__auth-btn" href="/login" (click)="closeMenu()">
          {{ 'nav.login' | transloco }}
        </a>
        <a class="btn btn--primary nav__auth-btn" href="/register" (click)="closeMenu()">
          {{ 'nav.register' | transloco }}
        </a>
      </div>
    </nav>

    <!-- Acciones desktop -->
    <div class="nav__actions">
      <app-theme-toggle />
      <app-lang-selector />

      <div class="nav__auth-desktop">
        <a class="btn btn--ghost nav__login" href="/login">
          <svg viewBox="0 0 20 20" width="15" height="15" fill="none" aria-hidden="true">
            <circle cx="10" cy="6.5" r="3" stroke="currentColor" stroke-width="1.6"/>
            <path d="M3 17c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
          {{ 'nav.login' | transloco }}
        </a>
        <a class="btn btn--primary nav__register" href="/register">
          {{ 'nav.register' | transloco }}
        </a>
      </div>

      <button
        type="button"
        class="nav__burger"
        (click)="toggleMenu()"
        [attr.aria-expanded]="menuOpen()"
        [attr.aria-label]="'nav.openMenu' | transloco"
      >
        <span [class.open]="menuOpen()"></span>
        <span [class.open]="menuOpen()"></span>
        <span [class.open]="menuOpen()"></span>
      </button>
    </div>

  </div>
</header>
