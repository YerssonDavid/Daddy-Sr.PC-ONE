<header class="chat-header">

  <!-- Menu button (visible en tablet/mobile) -->
  <button
    type="button"
    class="chat-header__menu-btn"
    (click)="toggleSidebar.emit()"
    [attr.aria-label]="sidebarOpen() ? 'Cerrar panel' : 'Abrir panel'"
    [attr.aria-expanded]="sidebarOpen()"
  >
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" aria-hidden="true">
      @if (sidebarOpen()) {
        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      } @else {
        <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      }
    </svg>
  </button>

  <!-- Agent identity -->
  <div class="chat-header__agent">
    <div class="chat-header__avatar" aria-hidden="true">
      <img src="logo.png" alt="" width="32" height="32" />
      <span class="chat-header__status-dot"></span>
    </div>
    <div class="chat-header__agent-info">
      <span class="chat-header__agent-name">Daddy Sr.PC</span>
      <span class="chat-header__agent-status">{{ 'chat.agentStatus' | transloco }}</span>
    </div>
  </div>

  <!-- Spacer -->
  <div class="chat-header__spacer"></div>

  <!-- Request counter (plan §5.2) -->
  <div
    class="chat-header__counter"
    [class.chat-header__counter--soft]="counter.notice() === 'soft'"
    [class.chat-header__counter--strong]="counter.notice() === 'strong'"
    [class.chat-header__counter--depleted]="counter.depleted()"
    role="status"
    aria-live="polite"
    [attr.aria-label]="'Quedan ' + counter.remaining() + ' de ' + counter.total + ' preguntas gratis'"
  >
    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" aria-hidden="true">
      <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.5"/>
      <path d="M12 7v5l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <span class="chat-header__counter-text mono">
      {{ counter.remaining() }}/{{ counter.total }}
    </span>
  </div>

  <!-- Theme toggle -->
  <app-theme-toggle />

</header>
