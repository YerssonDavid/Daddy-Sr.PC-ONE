<aside class="sidebar" [class.sidebar--collapsed]="collapsed()" aria-label="Panel de conversaciones">

  <!-- Top bar: perfil de GitHub + control de colapso -->
  <div class="sidebar__top">
    <a
      class="sidebar__github"
      href="https://github.com/YerssonDavid"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Ir al perfil de GitHub — YerssonDavid"
      [attr.title]="collapsed() ? 'GitHub — YerssonDavid' : null"
    >
      <svg class="sidebar__github-icon" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
        <path fill-rule="evenodd" clip-rule="evenodd" d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/>
      </svg>
      <span class="sidebar__github-name sidebar__collapsible">YerssonDavid</span>
    </a>

    <button
      type="button"
      class="sidebar__collapse-btn"
      (click)="toggle.emit()"
      [attr.aria-label]="collapsed() ? 'Expandir panel' : 'Colapsar panel'"
      [attr.aria-expanded]="!collapsed()"
    >
      <svg class="sidebar__collapse-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true">
        <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <!-- New chat button -->
  <button type="button" class="sidebar__new-btn btn btn--primary" (click)="newChat()">
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" aria-hidden="true">
      <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span class="sidebar__collapsible">{{ 'chat.newChat' | transloco }}</span>
  </button>

  <!-- Conversation list -->
  <nav class="sidebar__nav" aria-label="Chats recientes">
    <p class="sidebar__section-label eyebrow">{{ 'chat.recent' | transloco }}</p>
    <ul class="sidebar__list" role="list">
      @for (conv of store.conversations(); track conv.id) {
        <li class="sidebar__item" [class.sidebar__item--active]="isActive(conv.id)">
          <button
            type="button"
            class="sidebar__conv-btn"
            (click)="selectConversation(conv)"
            [attr.aria-current]="isActive(conv.id) ? 'page' : null"
            [attr.title]="conv.title"
          >
            <span class="sidebar__conv-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
                  stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
              </svg>
            </span>
            <span class="sidebar__conv-title sidebar__collapsible">{{ conv.title }}</span>
            <span class="sidebar__conv-date sidebar__collapsible">{{ formatDate(conv.updatedAt) }}</span>
          </button>
          <button
            type="button"
            class="sidebar__delete-btn"
            (click)="deleteConversation($event, conv.id)"
            aria-label="Eliminar conversación"
          >
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" aria-hidden="true">
              <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
            </svg>
          </button>
        </li>
      }
    </ul>
  </nav>

  <!-- Footer -->
  <footer class="sidebar__footer">
    <app-theme-toggle />
    <button
      type="button"
      class="sidebar__settings-btn"
      (click)="settingsOpen.emit()"
      [attr.aria-label]="'chat.settingsBtn' | transloco"
      [attr.title]="collapsed() ? ('chat.settingsBtn' | transloco) : null"
    >
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" aria-hidden="true">
        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="1.5"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
          stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="sidebar__collapsible">{{ 'chat.settingsBtn' | transloco }}</span>
    </button>
  </footer>

</aside>
