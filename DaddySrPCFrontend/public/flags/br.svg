<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 14">
  <!-- Green field -->
  <rect width="20" height="14" fill="#009C3B"/>
  <!-- Yellow rhombus -->
  <polygon points="10,1.4 18.6,7 10,12.6 1.4,7" fill="#FFDF00"/>
  <!-- Blue circle -->
  <circle cx="10" cy="7" r="3.3" fill="#002776"/>
  <!-- White band (arc representing the stars belt) -->
  <path d="M7.05,8.6 A3.3,3.3,0,0,1,12.95,8.6" stroke="#fff" stroke-width=".75" fill="none"/>
  <!-- Stars (simplified dots) -->
  <g fill="#fff">
    <circle cx="8.5"  cy="5.6" r=".25"/>
    <circle cx="10"   cy="5.0" r=".25"/>
    <circle cx="11.5" cy="5.6" r=".25"/>
    <circle cx="8.0"  cy="6.5" r=".25"/>
    <circle cx="12.0" cy="6.5" r=".25"/>
    <circle cx="9.0"  cy="7.6" r=".25"/>
    <circle cx="11.0" cy="7.6" r=".25"/>
    <circle cx="10"   cy="8.4" r=".25"/>
  </g>
</svg>
